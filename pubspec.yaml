name: poultry_books
description: Layer farm tracker — eggs, sales, expenses.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  firebase_core: ^3.4.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.0
  connectivity_plus: ^6.0.3
  intl: ^0.19.0
  uuid: ^4.2.2
  path_provider: ^2.1.2
  cupertino_icons: ^1.0.2
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.3.9
  integration_test:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.0
  build_runner: ^2.4.0
  flutter_lints: ^2.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/splash/app_icon.png"
  android: true
  ios: true
  fullscreen: false
  android_gravity: center
  ios_content_mode: center
  android_12:
    image: "assets/splash/app_icon.png"
    icon_background_color: "#FFFFFF"
    color: "#FFFFFF"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/splash/
